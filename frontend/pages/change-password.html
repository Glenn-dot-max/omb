<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Changement de mot de passe - Oh My Brunch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body>
    <div class="login-container">
      <!-- Header avec logo -->
      <div class="login-header">
        <div class="logo-container">
          <img src="../assets/logo-rond.svg" alt="Oh My Brunch" />
        </div>
        <h1>🔒 Changement obligatoire</h1>
        <p>Définissez votre nouveau mot de passe</p>
      </div>

      <!-- Bannière d'avertissement -->
      <div class="warning-banner">
        <p>
          ⚠️ <strong>Première connexion :</strong> Pour des raisons de sécurité,
          vous devez définir un nouveau mot de passe avant d'accéder à
          l'application.
        </p>
      </div>

      <!-- Message d'erreur -->
      <div id="errorMessage" class="error-message"></div>

      <!-- Formulaire de changement -->
      <form id="changePasswordForm">
        <div class="form-group">
          <label for="old-password">🔑 Mot de passe temporaire</label>
          <input
            type="password"
            id="old-password"
            placeholder="Mot de passe actuel"
            required
            autocomplete="current-password"
          />
        </div>

        <div class="form-group">
          <label for="new-password">🆕 Nouveau mot de passe</label>
          <input
            type="password"
            id="new-password"
            placeholder="Minimum 8 caractères"
            required
            autocomplete="new-password"
          />
          <div class="password-strength">
            <div class="password-strength-bar" id="strength-bar"></div>
          </div>
          <div class="password-hint">
            Au moins 8 caractères, une majuscule, une minuscule et un chiffre.
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-password">✅ Confirmer le mot de passe</label>
          <input
            type="password"
            id="confirm-password"
            placeholder="Retapez le nouveau mot de passe"
            required
            autocomplete="new-password"
          />
        </div>

        <button type="submit" class="btn-login" id="submitBtn">
          Changer mon mot de passe
        </button>
      </form>
    </div>

    <!-- Scripts -->
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script>
      // Vérifier que l'utilisateur est bien connecté
      if (!isAuthenticated()) {
        window.location.href = "/pages/login.html";
      }

      const form = document.getElementById("changePasswordForm");
      const newPasswordInput = document.getElementById("new-password");
      const strengthBar = document.getElementById("strength-bar");
      const errorMessage = document.getElementById("errorMessage");
      const submitBtn = document.getElementById("submitBtn");

      // Indicateur de force du mot de passe
      newPasswordInput.addEventListener("input", () => {
        const password = newPasswordInput.value;
        let strength = 0;

        if (password.length >= 8) strength++;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^a-zA-Z0-9]/.test(password)) strength++;

        strengthBar.className = "password-strength-bar";
        if (strength === 0) {
          strengthBar.style.width = "0";
        } else if (strength <= 2) {
          strengthBar.classList.add("strength-weak");
        } else if (strength === 3) {
          strengthBar.classList.add("strength-medium");
        } else {
          strengthBar.classList.add("strength-strong");
        }
      });

      // Soumettre le formulaire
      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const oldPassword = document.getElementById("old-password").value;
        const newPassword = document.getElementById("new-password").value;
        const confirmPassword =
          document.getElementById("confirm-password").value;

        // Validation
        if (newPassword !== confirmPassword) {
          showError("Les mots de passe ne correspondent pas.");
          return;
        }

        if (newPassword.length < 8) {
          showError("Le mot de passe doit contenir au moins 8 caractères.");
          return;
        }

        if (!/[A-Z]/.test(newPassword)) {
          showError("Le mot de passe doit contenir au moins une majuscule.");
          return;
        }

        if (!/[a-z]/.test(newPassword)) {
          showError("Le mot de passe doit contenir au moins une minuscule.");
          return;
        }

        if (!/[0-9]/.test(newPassword)) {
          showError("Le mot de passe doit contenir au moins un chiffre.");
          return;
        }

        if (oldPassword === newPassword) {
          showError("Le nouveau mot de passe doit être différent de l'ancien.");
          return;
        }

        // Désactiver le bouton
        submitBtn.disabled = true;
        submitBtn.textContent = "⏳ Changement en cours...";

        try {
          const response = await fetch(`${API_URL}/auth/change-password`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${getToken()}`,
            },
            body: JSON.stringify({
              old_password: oldPassword,
              new_password: newPassword,
            }),
          });

          if (!response.ok) {
            const error = await response.json();
            throw new Error(
              error.detail || "Erreur lors du changement de mot de passe",
            );
          }

          // Succès !
          alert(
            "✅ Mot de passe changé avec succès ! Vous allez être redirigé...",
          );

          // Rediriger vers la page commandes
          window.location.href = "/pages/commandes.html";
        } catch (error) {
          console.error("Erreur:", error);
          showError(error.message);
          submitBtn.disabled = false;
          submitBtn.textContent = "Changer mon mot de passe";
        }
      });

      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.classList.add("show");
        setTimeout(() => {
          errorMessage.classList.remove("show");
        }, 5000);
      }
    </script>
  </body>
</html>
