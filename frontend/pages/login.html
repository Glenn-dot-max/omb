<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oh My Brunch - Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body>
    <div class="login-container">
      <!-- Header avec logo -->
      <div class="login-header">
        <div class="logo-container">
          <img src="../assets/logo-rond.svg" alt="Oh My Brunch" />
        </div>
        <h1>Oh My Brunch</h1>
        <p>Accédez à votre espace franchise</p>
      </div>

      <!-- Message d'erreur -->
      <div id="errorMessage" class="error-message"></div>

      <!-- Formulaire de connexion -->
      <form id="loginForm">
        <div class="form-group">
          <label for="email">📧 Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="votre@email.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password">🔒 Mot de passe</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="btn-login" id="loginButton">
          Se connecter
        </button>
      </form>

      <!-- Lien mot de passe oublié -->
      <div class="forgot-password">
        <a href="#" id="forgotPasswordLink">Mot de passe oublié ?</a>
      </div>

      <!-- Info franchise -->
      <div class="franchise-info">
        <p>🥐 Gestion de commandes et planning</p>
      </div>
    </div>

    <!-- Modale mot de passe oublié -->
    <div id="forgotPasswordModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Mot de passe oublié</h3>
          <span class="close-modal" id="closeModal">&times;</span>
        </div>

        <div class="modal-body">
          <p>
            <strong>Pour réinitialiser votre mot de passe :</strong>
          </p>
          <p>
            Contactez votre administrateur à l'adresse :
            <br />
            <strong>admin@ohmybrunch.fr</strong>
          </p>
          <p style="font-size: 13px; color: #999; margin-top: 20px">
            Vous recevrez un nouveau mot de passe par email sous 24h.
          </p>
        </div>

        <div class="modal-footer">
          <button class="btn-secondary" id="closeModalBtn">Fermer</button>
          <button class="btn-primary" id="contactAdminBtn">
            📧 Contacter l'admin
          </button>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script>
      // Empêcher l'accès si déjà connecté
      if (isAuthenticated()) {
        window.location.href = "commandes.html";
      }

      // Éléments DOM
      const loginForm = document.getElementById("loginForm");
      const loginButton = document.getElementById("loginButton");
      const errorMessage = document.getElementById("errorMessage");
      const forgotPasswordLink = document.getElementById("forgotPasswordLink");
      const forgotPasswordModal = document.getElementById(
        "forgotPasswordModal",
      );
      const closeModal = document.getElementById("closeModal");
      const closeModalBtn = document.getElementById("closeModalBtn");
      const contactAdminBtn = document.getElementById("contactAdminBtn");

      // Gérer la soumission du formulaire
      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        // Désactiver le bouton pendant la requête
        loginButton.disabled = true;
        loginButton.textContent = "Connexion...";
        errorMessage.classList.remove("show");

        try {
          const result = await login(email, password);

          if (result.success) {
            if (result.must_change_password) {
              window.location.href = "change-password.html";
              return;
            }
            // Connexion réussie, rediriger
            window.location.href = "commandes.html";
          } else {
            // Afficher l'erreur
            errorMessage.textContent =
              result.error || "Email ou mot de passe incorrect";
            errorMessage.classList.add("show");
          }
        } catch (error) {
          errorMessage.textContent = "Erreur de connexion. Réessayez.";
          errorMessage.classList.add("show");
        } finally {
          // Réactiver le bouton
          loginButton.disabled = false;
          loginButton.textContent = "Se connecter";
        }
      });

      // Ouvrir la modale "Mot de passe oublié"
      forgotPasswordLink.addEventListener("click", (e) => {
        e.preventDefault();
        forgotPasswordModal.style.display = "block";
      });

      // Fermer la modale
      closeModal.addEventListener("click", () => {
        forgotPasswordModal.style.display = "none";
      });

      closeModalBtn.addEventListener("click", () => {
        forgotPasswordModal.style.display = "none";
      });

      // Fermer si clic en dehors
      window.addEventListener("click", (e) => {
        if (e.target === forgotPasswordModal) {
          forgotPasswordModal.style.display = "none";
        }
      });

      // Bouton "Contacter l'admin"
      contactAdminBtn.addEventListener("click", () => {
        window.location.href =
          "mailto:admin@ohmybrunch.fr?subject=Réinitialisation de mot de passe&body=Bonjour,%0D%0A%0D%0AJe souhaite réinitialiser mon mot de passe pour mon compte Oh My Brunch.%0D%0A%0D%0AMerci.";
      });
    </script>
  </body>
</html>
