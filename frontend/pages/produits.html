<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produits - Oh My Brunch</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <h1>🥐 Oh My Brunch</h1>
      <ul class="nav-links">
        <li><a href="produits.html">Produits</a></li>
        <li><a href="formules.html">Formules</a></li>
        <li><a href="commandes.html">Commandes</a></li>
        <li><a href="planning.html">Planning</a></li>
      </ul>
    </nav>

    <!-- Contenu principal -->
    <main class="container">
      <h2>📦 Gestion des Produits</h2>

      <!-- Formulaire d'ajout -->
      <div class="form-card">
        <h3>Ajouter un produit</h3>
        <form id="add-product-form">
          <input
            type="text"
            id="product-name"
            placeholder="Nom du produit"
            required
          />
          <select id="product-category" required>
            <option value="">-- Catégorie --</option>
          </select>
          <select id="product-type" required>
            <option value="">-- Type --</option>
          </select>
          <button type="submit" class="btn">Ajouter</button>
        </form>
      </div>

      <!-- Barre de recherche et filtres -->
      <div class="search-card">
        <h3>Rechercher et filtrer</h3>
        <input
          type="text"
          id="search-input"
          placeholder="🔍 Rechercher un produit..."
        />
        <select id="filter-category">
          <option value="">-- Filtrer par catégorie --</option>
        </select>
        <select id="filter-type">
          <option value="">-- Filtrer par type --</option>
        </select>

        <button id="reset-filters" class="btn-secondary">
          Effacer les filtres
        </button>

        <!-- ✅ Toggle Vue (déplacé ici) -->
        <div
          class="view-toggle"
          style="margin-top: 1rem; float: right; clear: both"
        >
          <button id="view-cards" class="toggle-btn active" title="Vue cartes">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="3" width="7" height="7" rx="1" />
              <rect x="14" y="3" width="7" height="7" rx="1" />
              <rect x="3" y="14" width="7" height="7" rx="1" />
              <rect x="14" y="14" width="7" height="7" rx="1" />
            </svg>
          </button>
          <button id="view-table" class="toggle-btn" title="Vue tableau">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="8" y1="6" x2="21" y2="6" />
              <line x1="8" y1="12" x2="21" y2="12" />
              <line x1="8" y1="18" x2="21" y2="18" />
              <line x1="3" y1="6" x2="3.01" y2="6" />
              <line x1="3" y1="12" x2="3.01" y2="12" />
              <line x1="3" y1="18" x2="3.01" y2="18" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Liste des produits -->
      <div id="products-list" class="products-list">
        <!-- Les produits s'afficheront ici dynamiquement -->
      </div>
    </main>

    <!-- Modale de modification -->
    <div id="edit-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Modifier le produit</h3>
          <span class="close-modal">&times;</span>
        </div>

        <form id="edit-product-form">
          <input
            type="text"
            id="edit-product-name"
            placeholder="Nom du produit"
            required
          />
          <select id="edit-product-category" required>
            <option value="">-- Catégorie --</option>
          </select>
          <select id="edit-product-type" required>
            <option value="">-- Type --</option>
          </select>

          <div class="modal-actions">
            <button type="button" class="btn-secondary" id="cancel-edit">
              Annuler
            </button>
            <button type="submit" class="btn">Enregistrer</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Scripts JavaScript -->
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/produits.js"></script>
    <script>
      requireAuth();
      window.addEventListener("DOMContentLoaded", () => {
        displayUserInfo();
      });
    </script>
  </body>
</html>
